<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form >
        <label for="name">Name:</label>
        <input type="text" name="username" id="name"  >

        <br><br>

        <label for="age">age:</label>
        <input type="number" name="user age" id="age">

        <br><br>

        <label for="password">password:</label>
        <input type="password" name="userpassword" id="password">

        <br><br>

        <label for="male">male</label>
        <input type="radio" name="gender" id="male" value="male">

        <label for="female">female</label>
        <input type="radio" name="gender" id="female" value="female">

        <label for="other">other</label>
        <input type="radio" name="gender" id="other" value="other">
        <!--agr tumhe id for value samajh me nhi rha hai to plz ai ko code copy karke puch lo vaise 
        ye to nhi hi bhulna chaiye tumhe -->
        <br><br>
        <label for="c++">c++</label>
        <input type="checkbox" name="subject" id="c++" value="c++">

        <label for="python">python</label>
        <input type="checkbox" name=" subject" id="python" value="python">

        <label for="java">java</label>
        <input type="checkbox" name="subject" id="java" value="java">

        <label for="css">css</label>
        <input type="checkbox" name="subject" id="css" value="css">

        <br><br>
        <input type="submit">
        <!-- 
        <label> tag ka 'for' attribute us input ke 'id' se judta hai, 
        jisse label pe click karne se input box activate ho jaata hai.

        <input> tag me:
        - 'id' input box ki pehchaan ke liye hota hai (label se connect karne ke liye bhi).
        - 'name' form data ko server par bhejne ke liye use hota hai (yeh field ka naam hota hai).
        - 'value' input box me pehle se koi value dikhane ke liye hota hai 
         ya user ki type ki hui value store karta hai.
        -->


    </form>

</body>
</html>
